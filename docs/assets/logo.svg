<svg xmlns="http://www.w3.org/2000/svg" width="620" height="120" viewBox="0 0 620 120" role="img" aria-label="embodimetry">
  <title>embodimetry</title>
  <!-- Monochrome wordmark: currentColor adapts to light and dark backgrounds. Mark = calibration ticks capped with measurement nodes. -->
  <g fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="10" y="10" width="100" height="100" rx="22"/>
    <line x1="38" y1="86" x2="38" y2="70"/>
    <line x1="60" y1="86" x2="60" y2="54"/>
    <line x1="82" y1="86" x2="82" y2="38"/>
  </g>
  <g fill="currentColor">
    <circle cx="38" cy="70" r="6.5"/>
    <circle cx="60" cy="54" r="6.5"/>
    <circle cx="82" cy="38" r="6.5"/>
    <rect x="32" y="90" width="56" height="6" rx="3"/>
  </g>
  <text x="138" y="74" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,Consolas,monospace" font-size="46" font-weight="700" fill="currentColor" letter-spacing="-1">embodi<tspan fill-opacity="0.55">metry</tspan></text>
</svg>
